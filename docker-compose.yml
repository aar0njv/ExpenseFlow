
name: expenseflow

networks:
  expenseflow_net:
    driver: bridge

volumes:
  account_db_data:
  transaction_db_data:
  report_db_data: 

services:

# database setup

  account-db:

    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
      POSTGRES_DB: account_db

    volumes:
      - account_db_data:/var/lib/postgresql/data
    
    networks:
      - expenseflow_net
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user -d account_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  transaction-db:
    
    image: postgres:16-alpine
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_password
      POSTGRES_DB: transaction_db
    
    volumes:
      - transaction_db_data:/var/lib/postgresql/data
    
    networks:
      - expenseflow_net
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_user -d transaction_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  report-db:
    
    image: postgres:16-alpine
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: report_password
      POSTGRES_DB: report_db
    
    volumes:
      - report_db_data:/var/lib/postgresql/data
    
    networks:
      - expenseflow_net
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report_user -d report_db"]
      interval: 5s
      timeout: 5s
      retries: 5

# services
  
  account-service:
    
    build:
      context: ./account-service
      dockerfile: Dockerfile
    
    ports:
      - "8001:8000"
    environment:
      - expenseflow_net
    
    depends_on:
      account-db:
        condition: service_healthy

  transaction-service:

    build:
      context: ./transaction-service
      dockerfile: Dockerfile

    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://transaction_user:transaction_password@transaction-db:5432/transaction_db
    
    networks:
      - expenseflow_net
    
    depends_on:
      transaction-db:
        condition: service_healthy

  report-service:
    
    build:
      context: ./report-service
      dockerfile: Dockerfile
    
    ports:
      - "8003:8000"
    
    environment:
      - DATABASE_URL=postgresql://report_user:report_password@report-db:5432/report_db
      - ACCOUNT_SERVICE_URL=http://account-service:8000
      - TRANSACTION_SERVICE_URL=http://transaction-service:8000
    
    networks:
      - expenseflow_net
    
    depends_on:
      report-db:
        condition: service_healthy
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started